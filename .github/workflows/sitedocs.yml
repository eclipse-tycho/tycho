name: Tycho site-docs
concurrency: 
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
on:
  push:
    branches: 
      - 'main'
    paths:
      - 'src/site/**'
  pull_request:
    branches: 
      - 'main'
    paths:
      - 'src/site/**'
      - .github/workflows/sitedocs.yml

permissions:
  contents: read

jobs:
  build:
    name: Build site-docs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    permissions:
      contents: write
      repository-projects: write
    steps:
    - name: Inject slug/short variables
      uses: rlespinasse/github-slug-action@ef93b2ea4b6405d06fd8684fc3ff795d262ecae8 # v5.7.0
    - name: Checkout tycho code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
       path: 'tycho'
    - name: Checkout page
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
       path: 'page'
       token: ${{ secrets.TYCHO_SITE_PAT }}
       repository: 'eclipse-tycho/eclipse-tycho.github.io'
    - name: Set up Java
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        java-version: 21
        distribution: 'temurin'
        cache: maven
    - name: Set up Maven
      uses: stCarolas/setup-maven@12eb41b233df95d49b0c11fc1b5bc8312e5d4ce0 # v5.1
      with:
        maven-version: 3.9.16
    - name: Build site-doc
      env:
       JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}
      run: | 
        mvn -U -V -e -B -ntp clean install site site:stage --file tycho/pom.xml -T1C -DskipTests
    - name: Upload site-doc
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: site-docs-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || env.GITHUB_REF_NAME }}
        if-no-files-found: error
        path: |
          ${{ github.workspace }}/tycho/target/staging/**/*.*
    - name: Deploy to GitHub Pages
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        cd ${{ github.workspace }}/page/doc/
        git config user.name "Tycho Bot"
        git config user.email tycho-bot@eclipse.org
        cp -r ${{ github.workspace }}/tycho/target/staging/* ${{ env.GITHUB_REF_NAME }}
        git add -A
        git diff --quiet && git diff --staged --quiet || git commit -am "Update sitedocs for branch ${{ env.GITHUB_REF_NAME }}"
        git push

